openapi: 3.0.3
info:
  title: C5 360相机巡查标注系统 API
  version: 1.0.0
  license:
    name: Proprietary
  description: >
    Spec-first OpenAPI 3 contract for project C5 (360-camera inspection &
    annotation system). This single document is the authoritative source for
    oapi-codegen v2 → Go server stubs + TypeScript + Kotlin/Retrofit clients.


    Conventions:

    - Every response uses the shared envelope `{success, data, error, meta?}`.
      List endpoints populate `meta` with `{total, page, page_size}`.

    - All IDs are int64 (BIGSERIAL in the DB). `client_uuid` / `job_uuid` are
      UUID strings (offline idempotency / public job handles).

    - All geometry on the wire is WGS84 / SRID 4326 GeoJSON. GCJ-02 is NEVER
      persisted or transmitted; it is a client-only render-boundary concern.

    - All timestamps are RFC3339 / ISO-8601 UTC (`format: date-time`).

    - Error codes are a frozen, canonical enum (see ErrorObject.code).


    Out-of-band (NOT expressible in OpenAPI):

    - `GET /exports/{job_uuid}/events` is a Server-Sent Events (`text/event-stream`)
      endpoint emitting `event: progress` and a terminal `event: done`. It is
      hand-written with `GET /exports/{job_uuid}` as the polling fallback
      (Tencent CLB/CDN may buffer SSE). It is intentionally absent from `paths`.

    - Dictionary / config pull uses ETag (`If-None-Match: "<content_hash>"` →
      304 Not Modified when unchanged). 304 responses carry no body.

    - Large media binaries never traverse this JSON API: clients obtain STS
      credentials via `/media/upload-credentials`, multipart-upload directly to
      COS, then call `/media/confirm` (backend HeadObject-verifies the key).

servers:
  - url: /api/v1

security:
  - bearerAuth: []

tags:
  - name: auth
    description: Authentication & current-user session
  - name: users
    description: User administration (RBAC)
  - name: roles
    description: Role administration (casbin g/p mirror)
  - name: permissions
    description: Permission catalog (UI tree)
  - name: dict
    description: Dictionary types & items (admin-configurable, ETag pull)
  - name: config
    description: Versioned app config blocks
  - name: projects
    description: Projects CRUD
  - name: tasks
    description: Inspection tasks CRUD
  - name: inspections
    description: Inspection sessions & trajectory
  - name: problems
    description: Problem annotations, processing logs, map layer
  - name: media
    description: COS-backed media (STS upload, HeadObject confirm)
  - name: stats
    description: Aggregated statistics overview
  - name: exports
    description: Async Excel export jobs
  - name: sync
    description: Offline batch upsert
  - name: system
    description: Health & liveness

paths:
  # ===========================================================================
  # System
  # ===========================================================================
  /healthz:
    get:
      tags: [system]
      operationId: getHealthz
      summary: Liveness / readiness probe (DB + Redis ping)
      security: []
      responses:
        '200':
          description: Service healthy
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'
        '503':
          description: Service unhealthy (DB or Redis ping failed)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          $ref: '#/components/responses/InternalError'

  # ===========================================================================
  # Auth
  # ===========================================================================
  /auth/login:
    post:
      tags: [auth]
      operationId: authLogin
      summary: Login with username + password
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: Authenticated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoginResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthenticated'
        '422':
          $ref: '#/components/responses/ValidationFailed'
        '429':
          $ref: '#/components/responses/RateLimited'
        '500':
          $ref: '#/components/responses/InternalError'

  /auth/refresh:
    post:
      tags: [auth]
      operationId: authRefresh
      summary: Rotate refresh token, mint a new access token
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RefreshRequest'
      responses:
        '200':
          description: New access token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoginResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthenticated'
        '422':
          $ref: '#/components/responses/ValidationFailed'
        '429':
          $ref: '#/components/responses/RateLimited'
        '500':
          $ref: '#/components/responses/InternalError'

  /auth/logout:
    post:
      tags: [auth]
      operationId: authLogout
      summary: Revoke the current refresh token
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RefreshRequest'
      responses:
        '200':
          description: Logged out
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EmptyResponse'
        '401':
          $ref: '#/components/responses/Unauthenticated'
        '500':
          $ref: '#/components/responses/InternalError'

  /auth/me:
    get:
      tags: [auth]
      operationId: authMe
      summary: Current user + roles + effective permission codes
      responses:
        '200':
          description: Current authenticated principal
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthMeResponse'
        '401':
          $ref: '#/components/responses/Unauthenticated'
        '500':
          $ref: '#/components/responses/InternalError'

  /auth/password:
    put:
      tags: [auth]
      operationId: authChangePassword
      summary: Change own password
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ChangePasswordRequest'
      responses:
        '200':
          description: Password changed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EmptyResponse'
        '401':
          $ref: '#/components/responses/Unauthenticated'
        '422':
          $ref: '#/components/responses/ValidationFailed'
        '500':
          $ref: '#/components/responses/InternalError'

  # ===========================================================================
  # Users
  # ===========================================================================
  /users:
    get:
      tags: [users]
      operationId: listUsers
      summary: List users
      parameters:
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/PageSizeParam'
        - name: q
          in: query
          description: Search by username / display_name
          schema: { type: string }
        - name: is_active
          in: query
          schema: { type: boolean }
      responses:
        '200':
          description: User list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserListResponse'
        '401':
          $ref: '#/components/responses/Unauthenticated'
        '403':
          $ref: '#/components/responses/Forbidden'
        '500':
          $ref: '#/components/responses/InternalError'
    post:
      tags: [users]
      operationId: createUser
      summary: Create a user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserCreate'
      responses:
        '201':
          description: User created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserResponse'
        '401':
          $ref: '#/components/responses/Unauthenticated'
        '403':
          $ref: '#/components/responses/Forbidden'
        '409':
          $ref: '#/components/responses/Conflict'
        '422':
          $ref: '#/components/responses/ValidationFailed'
        '500':
          $ref: '#/components/responses/InternalError'

  /users/{id}:
    parameters:
      - $ref: '#/components/parameters/IdPath'
    get:
      tags: [users]
      operationId: getUser
      summary: Get a user by id
      responses:
        '200':
          description: User
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserResponse'
        '401':
          $ref: '#/components/responses/Unauthenticated'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalError'
    put:
      tags: [users]
      operationId: updateUser
      summary: Update a user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserUpdate'
      responses:
        '200':
          description: User updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserResponse'
        '401':
          $ref: '#/components/responses/Unauthenticated'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
        '422':
          $ref: '#/components/responses/ValidationFailed'
        '500':
          $ref: '#/components/responses/InternalError'
    delete:
      tags: [users]
      operationId: deleteUser
      summary: Soft-delete a user
      responses:
        '200':
          description: User deleted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EmptyResponse'
        '401':
          $ref: '#/components/responses/Unauthenticated'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
        '500':
          $ref: '#/components/responses/InternalError'

  /users/{id}/roles:
    parameters:
      - $ref: '#/components/parameters/IdPath'
    get:
      tags: [users]
      operationId: getUserRoles
      summary: Get a user's roles (casbin g-rules)
      responses:
        '200':
          description: User roles
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RoleListResponse'
        '401':
          $ref: '#/components/responses/Unauthenticated'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalError'
    put:
      tags: [users]
      operationId: setUserRoles
      summary: Replace a user's roles (casbin g-rules)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SetUserRolesRequest'
      responses:
        '200':
          description: Roles updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RoleListResponse'
        '401':
          $ref: '#/components/responses/Unauthenticated'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '422':
          $ref: '#/components/responses/ValidationFailed'
        '500':
          $ref: '#/components/responses/InternalError'

  /users/{id}/password:
    parameters:
      - $ref: '#/components/parameters/IdPath'
    put:
      tags: [users]
      operationId: resetUserPassword
      summary: Admin reset a user's password
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ResetPasswordRequest'
      responses:
        '200':
          description: Password reset
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EmptyResponse'
        '401':
          $ref: '#/components/responses/Unauthenticated'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '422':
          $ref: '#/components/responses/ValidationFailed'
        '500':
          $ref: '#/components/responses/InternalError'

  # ===========================================================================
  # Roles
  # ===========================================================================
  /roles:
    get:
      tags: [roles]
      operationId: listRoles
      summary: List roles
      responses:
        '200':
          description: Role list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RoleListResponse'
        '401':
          $ref: '#/components/responses/Unauthenticated'
        '403':
          $ref: '#/components/responses/Forbidden'
        '500':
          $ref: '#/components/responses/InternalError'
    post:
      tags: [roles]
      operationId: createRole
      summary: Create a role
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RoleCreate'
      responses:
        '201':
          description: Role created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RoleResponse'
        '401':
          $ref: '#/components/responses/Unauthenticated'
        '403':
          $ref: '#/components/responses/Forbidden'
        '409':
          $ref: '#/components/responses/Conflict'
        '422':
          $ref: '#/components/responses/ValidationFailed'
        '500':
          $ref: '#/components/responses/InternalError'

  /roles/{id}:
    parameters:
      - $ref: '#/components/parameters/IdPath'
    put:
      tags: [roles]
      operationId: updateRole
      summary: Update a role
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RoleUpdate'
      responses:
        '200':
          description: Role updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RoleResponse'
        '401':
          $ref: '#/components/responses/Unauthenticated'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
        '422':
          $ref: '#/components/responses/ValidationFailed'
        '500':
          $ref: '#/components/responses/InternalError'
    delete:
      tags: [roles]
      operationId: deleteRole
      summary: Delete a role (system roles protected)
      responses:
        '200':
          description: Role deleted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EmptyResponse'
        '401':
          $ref: '#/components/responses/Unauthenticated'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
        '500':
          $ref: '#/components/responses/InternalError'

  /roles/{id}/permissions:
    parameters:
      - $ref: '#/components/parameters/IdPath'
    get:
      tags: [roles]
      operationId: getRolePermissions
      summary: Get a role's permissions (casbin p-rules)
      responses:
        '200':
          description: Role permissions
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PermissionListResponse'
        '401':
          $ref: '#/components/responses/Unauthenticated'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalError'
    put:
      tags: [roles]
      operationId: setRolePermissions
      summary: Replace a role's permissions (casbin p-rules)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SetRolePermissionsRequest'
      responses:
        '200':
          description: Permissions updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PermissionListResponse'
        '401':
          $ref: '#/components/responses/Unauthenticated'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '422':
          $ref: '#/components/responses/ValidationFailed'
        '500':
          $ref: '#/components/responses/InternalError'

  # ===========================================================================
  # Permissions
  # ===========================================================================
  /permissions:
    get:
      tags: [permissions]
      operationId: listPermissions
      summary: Full permission catalog (UI tree)
      responses:
        '200':
          description: Permission catalog
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PermissionListResponse'
        '401':
          $ref: '#/components/responses/Unauthenticated'
        '403':
          $ref: '#/components/responses/Forbidden'
        '500':
          $ref: '#/components/responses/InternalError'

  # ===========================================================================
  # Dictionary
  # ===========================================================================
  /dict/types:
    get:
      tags: [dict]
      operationId: listDictTypes
      summary: List dictionary types
      parameters:
        - name: scope
          in: query
          schema:
            $ref: '#/components/schemas/DictScope'
        - name: is_active
          in: query
          schema: { type: boolean }
      responses:
        '200':
          description: Dict type list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DictTypeListResponse'
        '401':
          $ref: '#/components/responses/Unauthenticated'
        '500':
          $ref: '#/components/responses/InternalError'
    post:
      tags: [dict]
      operationId: createDictType
      summary: Create a dictionary type
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DictTypeCreate'
      responses:
        '201':
          description: Dict type created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DictTypeResponse'
        '401':
          $ref: '#/components/responses/Unauthenticated'
        '403':
          $ref: '#/components/responses/Forbidden'
        '409':
          $ref: '#/components/responses/Conflict'
        '422':
          $ref: '#/components/responses/ValidationFailed'
        '500':
          $ref: '#/components/responses/InternalError'

  /dict/types/{id}:
    parameters:
      - $ref: '#/components/parameters/IdPath'
    put:
      tags: [dict]
      operationId: updateDictType
      summary: Update a dictionary type
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DictTypeUpdate'
      responses:
        '200':
          description: Dict type updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DictTypeResponse'
        '401':
          $ref: '#/components/responses/Unauthenticated'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
        '422':
          $ref: '#/components/responses/ValidationFailed'
        '500':
          $ref: '#/components/responses/InternalError'
    delete:
      tags: [dict]
      operationId: deleteDictType
      summary: Soft-delete a dictionary type
      responses:
        '200':
          description: Dict type deleted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EmptyResponse'
        '401':
          $ref: '#/components/responses/Unauthenticated'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
        '500':
          $ref: '#/components/responses/InternalError'

  /dict/types/{code}/items:
    parameters:
      - $ref: '#/components/parameters/CodePath'
    get:
      tags: [dict]
      operationId: listDictItems
      summary: List items for a dictionary type (ETag pull)
      description: >
        Returns items + sets `ETag: "<dict_type.content_hash>"`. Clients send
        `If-None-Match` to receive 304 Not Modified when unchanged. The response
        body includes `version` + `content_hash` so offline clients can pin
        `dict_version_used`. Retired items (`is_active=false`) ARE included for
        historical readability.
      parameters:
        - $ref: '#/components/parameters/IfNoneMatchHeader'
        - name: include_inactive
          in: query
          description: Include retired (is_active=false) items. Default true.
          schema: { type: boolean, default: true }
      responses:
        '200':
          description: Dict items (with ETag header)
          headers:
            ETag:
              description: dict_type.content_hash
              schema: { type: string }
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DictItemsResponse'
        '304':
          description: Not Modified (ETag matched If-None-Match); no body
        '401':
          $ref: '#/components/responses/Unauthenticated'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalError'

  /dict/items:
    post:
      tags: [dict]
      operationId: createDictItem
      summary: Create a dictionary item (bumps the type's version/content_hash)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DictItemCreate'
      responses:
        '201':
          description: Dict item created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DictItemResponse'
        '401':
          $ref: '#/components/responses/Unauthenticated'
        '403':
          $ref: '#/components/responses/Forbidden'
        '409':
          $ref: '#/components/responses/Conflict'
        '422':
          $ref: '#/components/responses/ValidationFailed'
        '500':
          $ref: '#/components/responses/InternalError'

  /dict/items/{id}:
    parameters:
      - $ref: '#/components/parameters/IdPath'
    put:
      tags: [dict]
      operationId: updateDictItem
      summary: Update or retire a dictionary item (retire = is_active=false)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DictItemUpdate'
      responses:
        '200':
          description: Dict item updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DictItemResponse'
        '401':
          $ref: '#/components/responses/Unauthenticated'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
        '422':
          $ref: '#/components/responses/ValidationFailed'
        '500':
          $ref: '#/components/responses/InternalError'
    delete:
      tags: [dict]
      operationId: deleteDictItem
      summary: Retire a dictionary item (soft; never hard-delete referenced items)
      responses:
        '200':
          description: Dict item retired
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EmptyResponse'
        '401':
          $ref: '#/components/responses/Unauthenticated'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
        '500':
          $ref: '#/components/responses/InternalError'

  # ===========================================================================
  # Config
  # ===========================================================================
  /config/{key}:
    parameters:
      - $ref: '#/components/parameters/KeyPath'
    get:
      tags: [config]
      operationId: getConfig
      summary: Get the current active config block for a key (ETag pull)
      parameters:
        - $ref: '#/components/parameters/IfNoneMatchHeader'
      responses:
        '200':
          description: Active config block (with ETag header)
          headers:
            ETag:
              description: app_config.content_hash
              schema: { type: string }
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AppConfigResponse'
        '304':
          description: Not Modified (ETag matched If-None-Match); no body
        '401':
          $ref: '#/components/responses/Unauthenticated'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalError'
    put:
      tags: [config]
      operationId: putConfig
      summary: Publish a new version of a config block (supersedes the active one)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AppConfigUpdate'
      responses:
        '200':
          description: Config updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AppConfigResponse'
        '401':
          $ref: '#/components/responses/Unauthenticated'
        '403':
          $ref: '#/components/responses/Forbidden'
        '409':
          $ref: '#/components/responses/Conflict'
        '422':
