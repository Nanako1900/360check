  # ===========================================================================
  # Offline sync
  # ===========================================================================
  /sync/batch:
    post:
      tags: [sync]
      operationId: syncBatch
      summary: Idempotent offline batch upsert (per-item SAVEPOINT accept/reject/duplicate)
      description: >
        A single envelope carrying inspections, trajectory points, problems, and
        media references created offline. Each item carries its client-generated
        `client_uuid`; the server runs INSERT ... ON CONFLICT (client_uuid)
        inside a per-item SAVEPOINT so one bad item never aborts the batch.
        Historical-dictionary tolerance: items tagged with a since-retired
        `type_item` + older `dict_version_used` are accepted, not rejected.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SyncBatchRequest'
      responses:
        '200':
          description: Per-item results
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SyncBatchResponse'
        '401':
          $ref: '#/components/responses/Unauthenticated'
        '403':
          $ref: '#/components/responses/Forbidden'
        '422':
          $ref: '#/components/responses/ValidationFailed'
        '429':
          $ref: '#/components/responses/RateLimited'
        '500':
          $ref: '#/components/responses/InternalError'

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: Short-lived access JWT (golang-jwt/v5). Refresh is an opaque Redis token.

  parameters:
    IdPath:
      name: id
      in: path
      required: true
      schema: { type: integer, format: int64 }
    CodePath:
      name: code
      in: path
      required: true
      description: dict_type.code (machine key)
      schema: { type: string }
    KeyPath:
      name: key
      in: path
      required: true
      description: app_config.config_key
      schema: { type: string }
    JobUuidPath:
      name: job_uuid
      in: path
      required: true
      schema: { type: string, format: uuid }
    PageParam:
      name: page
      in: query
      schema: { type: integer, minimum: 1, default: 1 }
    PageSizeParam:
      name: page_size
      in: query
      schema: { type: integer, minimum: 1, maximum: 200, default: 20 }
    FromParam:
      name: from
      in: query
      description: Inclusive lower time bound (RFC3339 UTC)
      schema: { type: string, format: date-time }
    ToParam:
      name: to
      in: query
      description: Exclusive upper time bound (RFC3339 UTC)
      schema: { type: string, format: date-time }
    IfNoneMatchHeader:
      name: If-None-Match
      in: header
      description: ETag of the previously fetched payload (content_hash)
      schema: { type: string }

  responses:
    BadRequest:
      description: Malformed request
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    Unauthenticated:
      description: Missing/invalid/expired bearer token (UNAUTHENTICATED | TOKEN_EXPIRED)
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    Forbidden:
      description: casbin (sub,obj,act) denied (FORBIDDEN)
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    NotFound:
      description: Resource not found or soft-deleted (NOT_FOUND)
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    Conflict:
      description: Unique conflict / RESTRICT / illegal state transition (CONFLICT)
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    MediaVerifyFailed:
      description: HeadObject mismatch (MEDIA_VERIFY_FAILED); state stays UPLOADING
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    ValidationFailed:
      description: Boundary schema / business validation failed (VALIDATION_FAILED)
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    RateLimited:
      description: Hot-path rate limit hit (RATE_LIMITED); client must backoff
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    InternalError:
      description: Unhandled error (INTERNAL); never leaks stack/SQL
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'

  schemas:
    # -------------------------------------------------------------------------
    # Envelope building blocks
    # -------------------------------------------------------------------------
    Meta:
      type: object
      properties:
        total: { type: integer, format: int64 }
        page: { type: integer }
        page_size: { type: integer }
    ErrorCode:
      type: string
      enum:
        - VALIDATION_FAILED
        - UNAUTHENTICATED
        - TOKEN_EXPIRED
        - FORBIDDEN
        - NOT_FOUND
        - CONFLICT
        - MEDIA_VERIFY_FAILED
        - DICT_VERSION_RETIRED
        - RATE_LIMITED
        - INTERNAL
    ErrorDetail:
      type: object
      required: [field, code, message]
      properties:
        field: { type: string }
        code: { type: string }
        message: { type: string }
    ErrorObject:
      type: object
      required: [code, message]
      properties:
        code:
          $ref: '#/components/schemas/ErrorCode'
        message: { type: string }
        details:
          type: array
          items:
            $ref: '#/components/schemas/ErrorDetail'
    ErrorResponse:
      type: object
      required: [success, data, error]
      properties:
        success: { type: boolean, example: false }
        data:
          type: object
          nullable: true
          example: null
        error:
          $ref: '#/components/schemas/ErrorObject'
        meta:
          $ref: '#/components/schemas/Meta'
    EmptyResponse:
      type: object
      required: [success, error]
      properties:
        success: { type: boolean, example: true }
        data:
          type: object
          nullable: true
          example: null
        error:
          $ref: '#/components/schemas/ErrorObject'
        meta:
          $ref: '#/components/schemas/Meta'

    # -------------------------------------------------------------------------
    # GeoJSON primitives (WGS84 / 4326)
    # -------------------------------------------------------------------------
    GeoJSONPoint:
      type: object
      required: [type, coordinates]
      properties:
        type:
          type: string
          enum: [Point]
        coordinates:
          type: array
          description: '[longitude, latitude] in WGS84'
          items: { type: number }
          minItems: 2
          maxItems: 2
    GeoJSONLineString:
      type: object
      required: [type, coordinates]
      properties:
        type:
          type: string
          enum: [LineString]
        coordinates:
          type: array
          items:
            type: array
            items: { type: number }
            minItems: 2
            maxItems: 2
    GeoJSONMultiPolygon:
      type: object
      required: [type, coordinates]
      properties:
        type:
          type: string
          enum: [MultiPolygon]
        coordinates:
          type: array
          items:
            type: array
            items:
              type: array
              items:
                type: array
                items: { type: number }
    GeoJSONMultiLineString:
      type: object
      required: [type, coordinates]
      properties:
        type:
          type: string
          enum: [MultiLineString]
        coordinates:
          type: array
          items:
            type: array
            items:
              type: array
              items: { type: number }
    ProblemFeatureProperties:
      type: object
      required: [id]
      properties:
        id: { type: integer, format: int64 }
        type_item_id: { type: integer, format: int64, nullable: true }
        status_item_id: { type: integer, format: int64, nullable: true }
        category_item_id: { type: integer, format: int64, nullable: true }
        type_label: { type: string, nullable: true }
        status_label: { type: string, nullable: true }
        status_color: { type: string, nullable: true }
        title: { type: string }
        captured_at: { type: string, format: date-time }
        cover_media_id: { type: integer, format: int64, nullable: true }
    ProblemFeature:
      type: object
      required: [type, geometry, properties]
      properties:
        type:
          type: string
          enum: [Feature]
        geometry:
          $ref: '#/components/schemas/GeoJSONPoint'
        properties:
          $ref: '#/components/schemas/ProblemFeatureProperties'
    ProblemFeatureCollection:
      type: object
      required: [type, features]
      properties:
        type:
          type: string
          enum: [FeatureCollection]
        features:
          type: array
          items:
            $ref: '#/components/schemas/ProblemFeature'

    # -------------------------------------------------------------------------
    # Native enums (exact canonical literals)
    # -------------------------------------------------------------------------
    ProjectStatus:
      type: string
      enum: [ACTIVE, PAUSED, ARCHIVED]
    TaskStatus:
      type: string
      enum: [PENDING, IN_PROGRESS, COMPLETED, ARCHIVED]
    InspectionStatus:
      type: string
      enum: [IN_PROGRESS, FINISHED, ABANDONED]
    CaptureState:
      type: string
      enum: [CAPTURED_RAW, STITCHED, QUEUED, UPLOADING, UPLOADED, CONFIRMED]
    MediaTier:
      type: string
      enum: [original, web, thumb]
    MediaOwnerType:
      type: string
      enum: [problem, inspection, project, user]
    JobStatus:
      type: string
      description: CANCELLED is the optional 5th value (cancellation is optional to expose).
      enum: [PENDING, RUNNING, SUCCEEDED, FAILED, CANCELLED]
    ExportType:
      type: string
      enum: [INSPECTION_RECORDS, PROBLEM_LIST, PROJECT_STATS]
    DictScope:
      type: string
      enum: [problem_type, problem_status, problem_category, project_field, capture_preset, misc]
    ProcessingAction:
      type: string
      description: STATUS_CHANGE is backend-only (D3); clients POST only COMMENT/REASSIGN.
      enum: [STATUS_CHANGE, COMMENT, REASSIGN]
    ClientLogAction:
      type: string
      description: Client-postable subset of ProcessingAction (D3).
      enum: [COMMENT, REASSIGN]
    SyncItemStatus:
      type: string
      enum: [accepted, rejected, duplicate]

    # -------------------------------------------------------------------------
    # Entity schemas
    # -------------------------------------------------------------------------
    User:
      type: object
      required: [id, username, display_name, is_active, created_at, updated_at]
      description: password_hash is NEVER exposed.
      properties:
        id: { type: integer, format: int64 }
        username: { type: string }
        display_name: { type: string }
        phone: { type: string, nullable: true }
        email: { type: string, nullable: true }
        avatar_media_id: { type: integer, format: int64, nullable: true }
        is_active: { type: boolean }
        last_login_at: { type: string, format: date-time, nullable: true }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }
    Role:
      type: object
      required: [id, code, name, is_system, sort_order]
      properties:
        id: { type: integer, format: int64 }
        code: { type: string }
        name: { type: string }
        description: { type: string }
        is_system: { type: boolean }
        sort_order: { type: integer }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }
    Permission:
      type: object
      required: [id, code, name, object, action]
      properties:
        id: { type: integer, format: int64 }
        code: { type: string }
        name: { type: string }
        object: { type: string }
        action: { type: string }
        group_name: { type: string }
        description: { type: string }
        sort_order: { type: integer }
    Project:
      type: object
      required: [id, code, name, status, created_at, updated_at]
      properties:
        id: { type: integer, format: int64 }
        code: { type: string }
        name: { type: string }
        description: { type: string }
        status:
          $ref: '#/components/schemas/ProjectStatus'
        custom_fields:
          type: object
          additionalProperties: true
        area_geom:
          $ref: '#/components/schemas/GeoJSONMultiPolygon'
        start_date: { type: string, format: date, nullable: true }
        end_date: { type: string, format: date, nullable: true }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }
    InspectionTask:
      type: object
      required: [id, project_id, title, status, created_at, updated_at]
      properties:
        id: { type: integer, format: int64 }
        project_id: { type: integer, format: int64 }
        title: { type: string }
        description: { type: string }
        status:
          $ref: '#/components/schemas/TaskStatus'
        assignee_id: { type: integer, format: int64, nullable: true }
        planned_start: { type: string, format: date-time, nullable: true }
        planned_end: { type: string, format: date-time, nullable: true }
        plan_geom:
          $ref: '#/components/schemas/GeoJSONMultiLineString'
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }
    Inspection:
      type: object
      required:
        - id
        - client_uuid
        - project_id
        - inspector_id
        - status
        - started_at
        - duration_seconds
        - mileage_meters
        - point_count
        - created_at
        - updated_at
      properties:
        id: { type: integer, format: int64 }
        client_uuid: { type: string, format: uuid }
        project_id: { type: integer, format: int64 }
        task_id: { type: integer, format: int64, nullable: true }
        inspector_id: { type: integer, format: int64 }
        status:
          $ref: '#/components/schemas/InspectionStatus'
        started_at: { type: string, format: date-time }
        ended_at: { type: string, format: date-time, nullable: true }
        duration_seconds: { type: integer, format: int64 }
        mileage_meters:
          type: number
          format: double
          description: SUM via ST_Length(route_geom::geography) — meters.
        point_count: { type: integer }
        route_geom:
          $ref: '#/components/schemas/GeoJSONLineString'
        device_info:
          type: object
          additionalProperties: true
        note: { type: string }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }
    TrajectoryPoint:
      type: object
      required: [id, client_uuid, inspection_id, seq, geom, recorded_at]
      properties:
        id: { type: integer, format: int64 }
        client_uuid: { type: string, format: uuid }
        inspection_id: { type: integer, format: int64 }
        seq: { type: integer }
        geom:
          $ref: '#/components/schemas/GeoJSONPoint'
        recorded_at: { type: string, format: date-time }
        speed: { type: number, format: float, nullable: true }
        bearing: { type: number, format: float, nullable: true }
        altitude: { type: number, format: float, nullable: true }
        accuracy: { type: number, format: float, nullable: true }
    Problem:
      type: object
      required:
        - id
        - client_uuid
        - project_id
        - inspector_id
        - geom
        - dict_version_used
        - captured_at
        - created_at
        - updated_at
      properties:
        id: { type: integer, format: int64 }
        client_uuid: { type: string, format: uuid }
        project_id: { type: integer, format: int64 }
        inspection_id: { type: integer, format: int64, nullable: true }
        inspector_id: { type: integer, format: int64 }
        geom:
          $ref: '#/components/schemas/GeoJSONPoint'
        type_item_id: { type: integer, format: int64, nullable: true }
        status_item_id: { type: integer, format: int64, nullable: true }
        category_item_id: { type: integer, format: int64, nullable: true }
        dict_version_used: { type: integer }
        title: { type: string }
        description: { type: string }
        note: { type: string }
        captured_at: { type: string, format: date-time }
        cover_media_id: { type: integer, format: int64, nullable: true }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }
    ProblemProcessingLog:
      type: object
      required: [id, problem_id, action, created_at]
      properties:
        id: { type: integer, format: int64 }
        problem_id: { type: integer, format: int64 }
        action:
          $ref: '#/components/schemas/ProcessingAction'
        from_status_item_id: { type: integer, format: int64, nullable: true }
        to_status_item_id: { type: integer, format: int64, nullable: true }
        note: { type: string }
        operator_id: { type: integer, format: int64, nullable: true }
        created_at: { type: string, format: date-time }
    MediaAsset:
      type: object
      required:
        - id
        - client_uuid
        - owner_type
        - owner_id
        - tier
        - cos_bucket
        - cos_key
        - cos_region
        - capture_state
        - created_at
        - updated_at
      properties:
        id: { type: integer, format: int64 }
        client_uuid: { type: string, format: uuid }
        owner_type:
          $ref: '#/components/schemas/MediaOwnerType'
        owner_id: { type: integer, format: int64 }
        tier:
          $ref: '#/components/schemas/MediaTier'
        cos_bucket: { type: string }
        cos_key: { type: string }
        cos_region: { type: string }
        content_type: { type: string }
        byte_size: { type: integer, format: int64, nullable: true }
        width: { type: integer, nullable: true }
        height: { type: integer, nullable: true }
        etag: { type: string, nullable: true }
        capture_state:
          $ref: '#/components/schemas/CaptureState'
        verified_at: { type: string, format: date-time, nullable: true }
        media_group: { type: string, format: uuid, nullable: true }
        meta:
          type: object
          additionalProperties: true
        signed_url:
          type: string
          nullable: true
          description: Signed CDN URL for this tier (populated by GET /media/{id}).
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }
    DictType:
      type: object
      required: [id, code, name, scope, version, content_hash, is_active]
      properties:
        id: { type: integer, format: int64 }
        code: { type: string }
        name: { type: string }
        scope:
          $ref: '#/components/schemas/DictScope'
        description: { type: string }
        version: { type: integer }
        content_hash: { type: string }
        is_active: { type: boolean }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }
    DictItem:
      type: object
      required: [id, dict_type_id, code, label, sort_order, is_active]
      properties:
        id: { type: integer, format: int64 }
        dict_type_id: { type: integer, format: int64 }
        code: { type: string }
        label: { type: string }
        color: { type: string, nullable: true }
        extra:
          type: object
          additionalProperties: true
        sort_order: { type: integer }
        is_active:
          type: boolean
          description: false = retired (kept for history; clients MUST still render).
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }
    DictItemsPayload:
      type: object
      required: [type, version, content_hash, items]
      properties:
        type:
          $ref: '#/components/schemas/DictType'
        version: { type: integer }
        content_hash: { type: string }
        items:
          type: array
          items:
            $ref: '#/components/schemas/DictItem'
    AppConfig:
      type: object
      required: [id, config_key, value, version, content_hash, is_active]
      properties:
        id: { type: integer, format: int64 }
        config_key: { type: string }
        value:
          type: object
          additionalProperties: true
        version: { type: integer }
        content_hash: { type: string }
        is_active: { type: boolean }
        effective_from: { type: string, format: date-time }
        effective_to: { type: string, format: date-time, nullable: true }
        description: { type: string }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }
    ExportJob:
      type: object
      required: [id, job_uuid, type, status, progress, processed_rows, created_at]
      properties:
        id: { type: integer, format: int64 }
        job_uuid: { type: string, format: uuid }
        type:
          $ref: '#/components/schemas/ExportType'
        params:
          type: object
          additionalProperties: true
        status:
          $ref: '#/components/schemas/JobStatus'
        progress: { type: integer, minimum: 0, maximum: 100 }
        total_rows: { type: integer, nullable: true }
        processed_rows: { type: integer }
        result_cos_key: { type: string, nullable: true }
        result_bucket: { type: string, nullable: true }
        result_url:
          type: string
          nullable: true
          description: Signed CDN URL to the produced .xlsx (set on SUCCEEDED).
        error: { type: string, nullable: true }
        requested_by: { type: integer, format: int64, nullable: true }
        started_at: { type: string, format: date-time, nullable: true }
        finished_at: { type: string, format: date-time, nullable: true }
        created_at: { type: string, format: date-time }
    CountBucket:
      type: object
      required: [label, count]
      properties:
        item_id: { type: integer, format: int64, nullable: true }
        inspector_id: { type: integer, format: int64, nullable: true }
        project_id: { type: integer, format: int64, nullable: true }
        label: { type: string }
        color:
          type: string
          nullable: true
          description: dict_item.color; retired items included for history.
        count: { type: integer, format: int64 }
    StatsOverview:
      type: object
      required:
        - inspection_count
        - problem_count
        - total_mileage_meters
        - total_duration_seconds
        - avg_duration_seconds
        - counts_by_type
        - counts_by_status
        - counts_by_inspector
        - counts_by_project
      properties:
        inspection_count: { type: integer, format: int64 }
        problem_count: { type: integer, format: int64 }
        total_mileage_meters: { type: number, format: double }
        total_duration_seconds: { type: integer, format: int64 }
        avg_duration_seconds: { type: number, format: double }
        counts_by_type:
          type: array
          items:
            $ref: '#/components/schemas/CountBucket'
        counts_by_status:
          type: array
          items:
            $ref: '#/components/schemas/CountBucket'
        counts_by_inspector:
          type: array
          items:
            $ref: '#/components/schemas/CountBucket'
        counts_by_project:
          type: array
          items:
            $ref: '#/components/schemas/CountBucket'
    Trajectory:
      type: object
      required: [inspection_id, points]
      properties:
        inspection_id: { type: integer, format: int64 }
        route:
          $ref: '#/components/schemas/GeoJSONLineString'
        points:
          type: array
          items:
            $ref: '#/components/schemas/TrajectoryPoint'
    AuthMe:
      type: object
      required: [user, roles, permissions]
      properties:
        user:
          $ref: '#/components/schemas/User'
        roles:
          type: array
          items:
            $ref: '#/components/schemas/Role'
        permissions:
          type: array
          description: Effective casbin permission codes (drives dynamic menu/guards).
          items: { type: string }
    AuthTokens:
      type: object
      required: [access_token, refresh_token, expires_in, user]
      properties:
        access_token: { type: string }
        refresh_token: { type: string }
        expires_in:
          type: integer
          description: Access token lifetime in seconds.
        user:
          $ref: '#/components/schemas/User'
    Health:
      type: object
      required: [status]
      properties:
        status: { type: string, example: ok }
        db: { type: boolean }
        redis: { type: boolean }

    # -------------------------------------------------------------------------
    # Request bodies
    # -------------------------------------------------------------------------
    LoginRequest:
      type: object
      required: [username, password]
      properties:
        username: { type: string }
        password: { type: string, format: password }
    RefreshRequest:
      type: object
      required: [refresh_token]
      properties:
        refresh_token: { type: string }
    ChangePasswordRequest:
      type: object
      required: [old_password, new_password]
      properties:
        old_password: { type: string, format: password }
        new_password: { type: string, format: password }
    ResetPasswordRequest:
      type: object
      required: [new_password]
      properties:
        new_password: { type: string, format: password }
    UserCreate:
      type: object
      required: [username, password]
      properties:
        username: { type: string }
        password: { type: string, format: password }
        display_name: { type: string }
        phone: { type: string }
        email: { type: string }
        is_active: { type: boolean, default: true }
        role_ids:
          type: array
          items: { type: integer, format: int64 }
    UserUpdate:
      type: object
      properties:
        display_name: { type: string }
        phone: { type: string, nullable: true }
        email: { type: string, nullable: true }
        avatar_media_id: { type: integer, format: int64, nullable: true }
        is_active: { type: boolean }
