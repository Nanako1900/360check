apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: c5-api
  namespace: c5
  labels:
    app.kubernetes.io/name: c5
    app.kubernetes.io/component: api
    app.kubernetes.io/part-of: c5-backend
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: c5-api
  minReplicas: 3
  maxReplicas: 12
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 30
      policies:
        - type: Percent
          value: 100
          periodSeconds: 30
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
        - type: Pods
          value: 1
          periodSeconds: 60
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: c5-api
  namespace: c5
  labels:
    app.kubernetes.io/name: c5
    app.kubernetes.io/component: api
spec:
  minAvailable: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: c5
      app.kubernetes.io/component: api
