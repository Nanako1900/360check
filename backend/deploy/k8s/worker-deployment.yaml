apiVersion: apps/v1
kind: Deployment
metadata:
  name: c5-worker
  namespace: c5
  labels:
    app.kubernetes.io/name: c5
    app.kubernetes.io/component: worker
    app.kubernetes.io/part-of: c5-backend
spec:
  replicas: 2
  revisionHistoryLimit: 5
  selector:
    matchLabels:
      app.kubernetes.io/name: c5
      app.kubernetes.io/component: worker
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
      maxSurge: 1
  template:
    metadata:
      labels:
        app.kubernetes.io/name: c5
        app.kubernetes.io/component: worker
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "9091"
        prometheus.io/path: "/metrics"
    spec:
      # asynq jobs (derive media, excel export) must drain before SIGKILL.
      terminationGracePeriodSeconds: 60
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        runAsGroup: 65532
        fsGroup: 65532
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: worker
          image: ccr.ccs.tencentyun.com/c5/c5-worker:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: metrics
              containerPort: 9091
          envFrom:
            - configMapRef:
                name: c5-config
            - secretRef:
                name: c5-secret
          env:
            - name: C5_OBSERV_SERVICE_NAME
              value: "c5-worker"
          # cmd/worker runs a tiny http server on :9091 serving /healthz + /metrics
          # alongside the asynq processor (asynq itself exposes no HTTP).
          livenessProbe:
            httpGet:
              path: /healthz
              port: metrics
            initialDelaySeconds: 5
            periodSeconds: 15
            timeoutSeconds: 2
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /readyz
              port: metrics
            initialDelaySeconds: 3
            periodSeconds: 15
            timeoutSeconds: 2
            failureThreshold: 3
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          resources:
            requests:
              cpu: "200m"
              memory: "256Mi"
            limits:
              # excelize CJK rendering of large exports is memory-hungry.
              cpu: "2000m"
              memory: "1Gi"
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      volumes:
        # excelize streams the produced .xlsx to a temp file before COS upload.
        - name: tmp
          emptyDir:
            sizeLimit: 1Gi
