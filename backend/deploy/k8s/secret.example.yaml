# TEMPLATE ONLY — contains NO real secrets. Copy to secret.yaml (gitignored),
# fill real values, and apply out-of-band (or better: source from Tencent SSM /
# external-secrets). Do NOT commit the filled-in copy.
#
#   kubectl -n c5 create secret generic c5-secret \
#     --from-literal=C5_DB_DSN='postgres://USER:PASS@HOST:5432/c5?sslmode=require' \
#     --from-literal=C5_REDIS_PASSWORD='...' \
#     --from-literal=C5_JWT_SECRET="$(openssl rand -base64 48)" \
#     --from-literal=C5_COS_SECRET_ID='...' \
#     --from-literal=C5_COS_SECRET_KEY='...'
#
# The JWT secret MUST be >= 32 bytes (config.Validate fail-fast).
apiVersion: v1
kind: Secret
metadata:
  name: c5-secret
  namespace: c5
  labels:
    app.kubernetes.io/name: c5
    app.kubernetes.io/part-of: c5-backend
type: Opaque
stringData:
  C5_DB_DSN: "postgres://CHANGE_ME:CHANGE_ME@CHANGE_ME:5432/c5?sslmode=require"
  C5_REDIS_PASSWORD: "CHANGE_ME"
  # Generate with: openssl rand -base64 48
  C5_JWT_SECRET: "CHANGE_ME_min_32_bytes_use_openssl_rand_base64_48"
  C5_COS_SECRET_ID: "CHANGE_ME"
  C5_COS_SECRET_KEY: "CHANGE_ME"
  # Bootstrap admin password — consumed once by the c5-create-admin Job (the seed
  # ships admin LOCKED). Use a strong value; rotate/remove after first login.
  C5_BOOTSTRAP_ADMIN_PASSWORD: "CHANGE_ME_strong_admin_password"
