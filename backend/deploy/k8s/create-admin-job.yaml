# Sets the bootstrap admin password from a deploy secret (the seed ships the admin
# LOCKED — no default credential, BE-CRIT1). Run ONCE, AFTER the migrate Job and
# BEFORE handing the URL to operators:
#   kubectl -n c5 apply -f create-admin-job.yaml
#   kubectl -n c5 wait --for=condition=complete job/c5-create-admin --timeout=120s
# Idempotent: re-running re-sets the password from the current secret value.
# Requires C5_BOOTSTRAP_ADMIN_PASSWORD (and optional C5_BOOTSTRAP_ADMIN_USERNAME)
# in the c5-secret (see secret.example.yaml).
apiVersion: batch/v1
kind: Job
metadata:
  name: c5-create-admin
  namespace: c5
  labels:
    app.kubernetes.io/name: c5
    app.kubernetes.io/component: create-admin
    app.kubernetes.io/part-of: c5-backend
spec:
  backoffLimit: 2
  ttlSecondsAfterFinished: 600
  template:
    metadata:
      labels:
        app.kubernetes.io/name: c5
        app.kubernetes.io/component: create-admin
    spec:
      restartPolicy: Never
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        runAsGroup: 65532
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: create-admin
          image: ccr.ccs.tencentyun.com/c5/c5-api:latest
          imagePullPolicy: IfNotPresent
          args: ["create-admin"]
          envFrom:
            - configMapRef:
                name: c5-config
            - secretRef:
                name: c5-secret
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          resources:
            requests:
              cpu: "50m"
              memory: "64Mi"
            limits:
              cpu: "500m"
              memory: "256Mi"
