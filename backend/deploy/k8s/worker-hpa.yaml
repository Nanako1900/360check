# Scales workers on CPU (excelize export / image derive are CPU-bound). For
# queue-depth-based scaling, add a KEDA ScaledObject against the asynq Redis
# queue length instead — left as a P7+ enhancement.
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: c5-worker
  namespace: c5
  labels:
    app.kubernetes.io/name: c5
    app.kubernetes.io/component: worker
    app.kubernetes.io/part-of: c5-backend
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: c5-worker
  minReplicas: 2
  maxReplicas: 8
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 75
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 600
      policies:
        - type: Pods
          value: 1
          periodSeconds: 120
