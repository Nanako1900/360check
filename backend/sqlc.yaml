# sqlc configuration — type-safe queries for pgx/v5.
#
# PostGIS discipline (P1): sqlc handles scalar/relational CRUD only. No sqlc query
# ever selects a raw geometry column or calls a PostGIS function (sqlc's analyzer
# cannot resolve them). All spatial I/O is hand-written pgx in the repo layer,
# casting geometry out as `ST_AsEWKB(geom)::bytea` and writing it back via a bytea
# parameter through `ST_GeomFromEWKB($n)`; internal/platform/geo converts to/from
# orb geometries at the service boundary.
version: "2"
sql:
  - engine: "postgresql"
    schema:
      - "db/migrations/000001_init.up.sql"
    queries: "db/queries"
    gen:
      go:
        package: "db"
        out: "internal/gen/db"
        sql_package: "pgx/v5"
        emit_json_tags: true
        emit_pointers_for_null_types: true
        emit_interface: true
        emit_empty_slices: true
        overrides:
          # uuid -> google/uuid.UUID. Geometry/geography are intentionally NOT
          # overridden: sqlc never sees a geom column (spatial I/O is hand-written
          # pgx in the repo layer).
          - db_type: "uuid"
            go_type:
              import: "github.com/google/uuid"
              type: "UUID"
          # timestamptz -> time.Time (nullable becomes *time.Time via
          # emit_pointers_for_null_types) so domain mappers to the oapi models are clean.
          - db_type: "timestamptz"
            go_type: "time.Time"
          - db_type: "pg_catalog.timestamptz"
            go_type: "time.Time"
