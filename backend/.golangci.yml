# golangci-lint configuration for the C5 backend.
run:
  timeout: 5m
  tests: true

# Generated code (oapi/sqlc) is excluded; it carries DO NOT EDIT headers but we
# also skip the directories explicitly.
issues:
  exclude-dirs:
    - internal/gen
    - Android-SDK
    - Android-SDK-V1.10.1
    - web-admin
  exclude-rules:
    - path: _test\.go
      linters:
        - errcheck

linters:
  enable:
    - govet
    - errcheck
    - staticcheck
    - ineffassign
    - unused
    - gofmt
    - goimports
    - misspell
    - revive
    - bodyclose
    - nilerr

linters-settings:
  goimports:
    local-prefixes: github.com/nnkglobal/c5-backend
  revive:
    rules:
      - name: exported
        disabled: true
