# =============================================================================
# C5 — 360 相机巡查标注系统 · Coolify / Docker Compose 部署清单（仓库根）。
# Coolify「资源类型 = Docker Compose」指向本文件 → 宿主 `docker compose` 起栈 →
# 仅 `api` 服务分配公网域名（Traefik 反代），其余服务同栈内部互通（服务名即 DNS）。
#
# 拓扑（前后端分离，见 docs/superpowers/specs/2026-06-29-前后端分离部署）：
#   · 前端 SPA 独立部署在 EdgeOne Pages（admin.x.com），不在本栈内。
#   · 后端 api 暴露公网（api.x.com），浏览器 + APP 跨域调用；api 开启 CORS 白名单。
#
# 设计约束（务必遵守）：
#   · 【绝不写自定义 networks:】——会让 Traefik 路由 504。同栈用服务名 DNS：
#       postgres / redis / api 直接当主机名用。
#   · 密钥只经环境变量注入，仓库零硬编码；种子管理员出厂 LOCKED（'!'），无默认凭据。
#   · 迁移幂等：`migrate` 一次性容器每次部署重跑；golang-migrate 按 version 幂等。
#   · 【CORS】C5_CORS_ALLOWED_ORIGINS 必须精确到前端域（如 https://admin.x.com），禁 `*`。
#   · 【限流 ClientIP】C5_SERVER_TRUSTED_PROXIES 必须收窄到 Coolify 代理(Traefik)的确切
#       子网/IP；过宽（如 10/8）会被伪造 X-Forwarded-For 绕过登录限流（见 spec MUST-FIX 2）。
#       默认留空=不信任任何代理=取直连 IP（防伪造，但 per-IP 限流会折叠到代理 IP）。
#   · 【/metrics】仅在 api 内网端口 :9090 暴露（不经 Traefik），公网 8080 不含 /metrics。
#
# Coolify「magic」变量（首次部署自动生成并持久化；本地用根 .env.example 模拟）：
#   SERVICE_PASSWORD_DB     → postgres 密码 + C5_DB_DSN 口令段
#   SERVICE_PASSWORD_REDIS  → redis requirepass + C5_REDIS_PASSWORD
#   SERVICE_BASE64_64_JWT   → C5_JWT_SECRET（64 字符 ≥ 32 字节，满足 HS256 强度校验）
#   SERVICE_FQDN_API_8080   → 分配给 api 的公网域名（容器端口 8080；仅此一个对外）
#
# 一次性建首位管理员（部署完成后，在 Coolify 的 api 容器终端跑【一次】，随后删除该变量）：
#   /c5-api create-admin       # 读 C5_BOOTSTRAP_ADMIN_PASSWORD，bcrypt 落库；幂等
# 切勿把 create-admin 放进每次部署（会每次重置管理员密码）。
# =============================================================================

services:
  # --- PostgreSQL + PostGIS（官方 postgres 无 PostGIS 扩展，必须此镜像）---
  postgres:
    image: postgis/postgis:16-3.4
    environment:
      POSTGRES_USER: c5
      POSTGRES_DB: c5
      POSTGRES_PASSWORD: ${SERVICE_PASSWORD_DB}
    volumes:
      - pgdata:/var/lib/postgresql/data   # 数据跨重部署存活（Postgres≤17 用挂载目录）
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U c5 -d c5"]
      interval: 10s
      timeout: 3s
      retries: 12
      start_period: 30s
    restart: unless-stopped

  # --- Redis（refresh token / asynq 队列在此，开 AOF + 卷持久化）---
  redis:
    image: redis:7
    # sh -c + "$$VAR"：口令为空时退化为「无认证」而非缺参启动失败；非空则启用 requirepass。
    command: sh -c 'redis-server --appendonly yes --requirepass "$$SERVICE_PASSWORD_REDIS"'
    environment:
      SERVICE_PASSWORD_REDIS: ${SERVICE_PASSWORD_REDIS}
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a \"$$SERVICE_PASSWORD_REDIS\" ping | grep -q PONG"]
      interval: 10s
      timeout: 3s
      retries: 12
    restart: unless-stopped

  # --- 一次性迁移容器（与 api 同镜像；每次部署先跑，幂等）---
  migrate:
    image: c5-api:local
    build:
      context: ./backend
      dockerfile: deploy/Dockerfile.api
    command: ["migrate"]
    environment:
      C5_DB_DSN: postgres://c5:${SERVICE_PASSWORD_DB}@postgres:5432/c5?sslmode=disable
    depends_on:
      postgres:
        condition: service_healthy
    # restart:"no" 让 Coolify 自动把本一次性容器排除出栈健康聚合（Coolify 源码：restart:no
    # 与 exclude_from_hc:true 等价触发排除）。故【不写 exclude_from_hc】——它是 Coolify 专有键，
    # 普通 `docker compose` 校验会拒绝（additional property not allowed），破坏本地起栈/CI。
    restart: "no"

  # --- API（内部服务，不分配域名；HEALTHCHECK 已内置镜像）---
  api:
    image: c5-api:local
    build:
      context: ./backend
      dockerfile: deploy/Dockerfile.api
    environment:
      C5_ENV: prod
      C5_SERVER_PORT: "8080"
      C5_SERVER_MODE: release
      # 仅 api 暴露公网域名；_8080 = 容器端口。必须字典写法（列表写法在 Coolify 按字典合并
      # 环境变量时会冲突，报 "non-string key ...environment: 0"）。
      SERVICE_FQDN_API_8080: ${SERVICE_FQDN_API_8080:-}
      # CORS 白名单：精确到前端域（如 https://admin.x.com），禁 `*`；prod 下 config 会 fail-fast。
      C5_CORS_ALLOWED_ORIGINS: ${C5_CORS_ALLOWED_ORIGINS:-}
      # 登录限流按 ClientIP。api 现直接经 Traefik 暴露公网 → 必须把本值收窄到 Coolify 代理
      # (Traefik) 的确切子网/IP，使 ClientIP 取到【真实】客户端 IP。过宽（如 10/8）会被伪造
      # X-Forwarded-For 绕过限流（spec MUST-FIX 2）。默认留空=不信任代理=取直连 peer IP。
      C5_SERVER_TRUSTED_PROXIES: ${C5_SERVER_TRUSTED_PROXIES:-}
      C5_DB_DSN: postgres://c5:${SERVICE_PASSWORD_DB}@postgres:5432/c5?sslmode=disable
      C5_REDIS_ADDR: redis:6379
      C5_REDIS_PASSWORD: ${SERVICE_PASSWORD_REDIS}
      C5_JWT_SECRET: ${SERVICE_BASE64_64_JWT}
      C5_JWT_ISSUER: c5-api
      C5_JWT_ACCESS_TTL: 15m
      C5_JWT_REFRESH_TTL: 720h
      # 首次建管理员用；建完即在 Coolify 删除此变量。
      C5_BOOTSTRAP_ADMIN_PASSWORD: ${C5_BOOTSTRAP_ADMIN_PASSWORD:-}
      # 腾讯云 COS / CDN（Coolify Secret 注入；本地留空 → media 走内存 mock，可正常启栈）。
      C5_COS_SECRET_ID: ${C5_COS_SECRET_ID:-}
      C5_COS_SECRET_KEY: ${C5_COS_SECRET_KEY:-}
      C5_COS_APP_ID: ${C5_COS_APP_ID:-}
      C5_COS_REGION: ${C5_COS_REGION:-ap-guangzhou}
      C5_COS_BUCKET_ORIGINAL: ${C5_COS_BUCKET_ORIGINAL:-}
      C5_COS_BUCKET_WEB: ${C5_COS_BUCKET_WEB:-}
      C5_COS_BUCKET_THUMB: ${C5_COS_BUCKET_THUMB:-}
      C5_COS_CDN_DOMAIN: ${C5_COS_CDN_DOMAIN:-}
      C5_COS_STS_ROLE_ARN: ${C5_COS_STS_ROLE_ARN:-}
    depends_on:
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
    restart: unless-stopped

  # --- asynq Worker（派生 web/thumb + Excel 导出 + reaper；内部服务）---
  worker:
    image: c5-worker:local
    build:
      context: ./backend
      dockerfile: deploy/Dockerfile.worker
    environment:
      C5_ENV: prod
      C5_DB_DSN: postgres://c5:${SERVICE_PASSWORD_DB}@postgres:5432/c5?sslmode=disable
      C5_REDIS_ADDR: redis:6379
      C5_REDIS_PASSWORD: ${SERVICE_PASSWORD_REDIS}
      # config.Load() 对所有二进制统一 fail-fast 校验 JWT 密钥，worker 也须提供。
      C5_JWT_SECRET: ${SERVICE_BASE64_64_JWT}
      C5_COS_SECRET_ID: ${C5_COS_SECRET_ID:-}
      C5_COS_SECRET_KEY: ${C5_COS_SECRET_KEY:-}
      C5_COS_APP_ID: ${C5_COS_APP_ID:-}
      C5_COS_REGION: ${C5_COS_REGION:-ap-guangzhou}
      C5_COS_BUCKET_ORIGINAL: ${C5_COS_BUCKET_ORIGINAL:-}
      C5_COS_BUCKET_WEB: ${C5_COS_BUCKET_WEB:-}
      C5_COS_BUCKET_THUMB: ${C5_COS_BUCKET_THUMB:-}
      C5_COS_CDN_DOMAIN: ${C5_COS_CDN_DOMAIN:-}
      C5_COS_STS_ROLE_ARN: ${C5_COS_STS_ROLE_ARN:-}
    depends_on:
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
    restart: unless-stopped

  # --- Web（前端 SPA）已迁出本栈 ---
  # 前端独立部署到腾讯云 EdgeOne Pages（admin.x.com）：其 CI 构建 + CDN 托管，经 CORS 跨域
  # 调用 api。安全头 / CSP / SPA 回退见 web-admin/public/_headers · _redirects。
  # 自托管整栈回退（web nginx 同源反代）见 web-admin/deploy/*（README 备选路径）。

volumes:
  pgdata:
  redisdata:
