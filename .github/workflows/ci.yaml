name: ci

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

# The Go backend lives in backend/ (api/openapi.yaml + db/migrations are backend-
# owned and shared with the web/app tracks). All run-steps execute there.
defaults:
  run:
    working-directory: backend

jobs:
  build-test:
    name: vet · gen-drift · build · unit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: backend/go.mod
          cache: true
          cache-dependency-path: backend/go.sum

      - name: Download modules
        run: go mod download

      - name: go vet
        run: go vet ./...

      - name: Code generation drift check (make gen && git diff --exit-code)
        run: |
          make gen
          git diff --exit-code -- internal/gen api || {
            echo "::error::Generated code is out of date. Run 'make gen' in backend/ and commit the result."
            exit 1
          }

      - name: Build
        run: go build ./...

      - name: Unit tests (race + coverage)
        run: go test -race -coverprofile=coverage.out ./...

      - name: Coverage summary
        run: go tool cover -func=coverage.out | tail -1

  lint:
    name: golangci-lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: backend/go.mod
          cache: true
          cache-dependency-path: backend/go.sum
      - uses: golangci/golangci-lint-action@v6
        with:
          version: latest
          working-directory: backend

  integration:
    name: integration (testcontainers PostGIS + Redis)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: backend/go.mod
          cache: true
          cache-dependency-path: backend/go.sum
      - name: Integration tests
        run: go test -tags=integration -race ./...

  docker:
    name: docker build (api + worker)
    runs-on: ubuntu-latest
    needs: build-test
    steps:
      - uses: actions/checkout@v4
      - name: Build API image
        run: docker build -f deploy/Dockerfile.api -t c5-api:ci .
      - name: Build worker image
        run: docker build -f deploy/Dockerfile.worker -t c5-worker:ci .
