# C5 web-admin — nginx 配置（生产静态托管 + 同源 /api 反代）。
# 监听 8080（nginx-unprivileged 以非 root uid 101 运行 → 可配 readOnlyRootFilesystem）。
# 在 Coolify / Compose 拓扑里【仅本 web 服务】对外暴露公网域名，并把 /api/* 同源反代到内部
# api 服务（api:8080）：浏览器单域名 → 免 CORS，CSP 对 API 维持 connect-src 'self'。
#
# 表头继承坑：nginx 不会把 server 级 `add_header` 继承进【自带 add_header 的 location】。
# 所以安全响应头在 server 作用域只设一次；缓存用 `expires`（不重置已继承的 add_header），
# 绝不在 location 里用 `add_header Cache-Control`。
server {
    listen 8080;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # --- 安全响应头（对每个响应，含 index.html 文档与被代理的 /api）---
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
    # CSP：API 同源（下方 /api 反代）→ connect-src 'self' 即覆盖。
    #   script-src：腾讯地图 GL SDK 从 map.qq.com 加载。若 GL 构建抛 CSP eval 错，再在此【追加】
    #               'wasm-unsafe-eval'（先测再加；不要加 'unsafe-eval'）。
    #   img-src / connect-src：'self' + 腾讯地图瓦片(*.map.qq.com,*.gtimg.com) + COS/CDN 媒体
    #               (*.myqcloud.com)。全景/缩略图经 GET /api/v1/media/{id} 返回的签名 URL 由
    #               Photo-Sphere-Viewer / <img> 直接加载 → 该 CDN 域必须同时在 connect-src 与 img-src。
    #   ⚠️ 上线前把 *.myqcloud.com 收敛到你的确切 COS bucket / CI / CDN 域；若 VITE_CDN_BASE 指向
    #      自有 CNAME 域，把它加进 connect-src 与 img-src，并删掉宽松通配。
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' https://map.qq.com https://*.map.qq.com; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob: https://*.map.qq.com https://*.gtimg.com https://*.myqcloud.com; font-src 'self' data:; connect-src 'self' https://*.map.qq.com https://*.gtimg.com https://*.myqcloud.com; worker-src 'self' blob:; frame-src 'self'; object-src 'none'; base-uri 'self'; form-action 'self'" always;

    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/css application/javascript application/json image/svg+xml application/wasm;

    # --- 同源 API 反代 → 内部 api 服务 ---
    # 变量式 proxy_pass + Docker 内嵌 DNS resolver(127.0.0.11)：nginx 在【请求时】才解析 `api`，
    # 于是 api 未就绪也能启动、api 重启后自动恢复（静态 upstream 会让 nginx 启动失败或缓存死 IP）。
    location /api/ {
        resolver 127.0.0.11 valid=10s;
        set $api_upstream http://api:8080;
        proxy_pass $api_upstream$request_uri;   # 保留原始 /api/v1/... 路径（后端就是 /api/v1）
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # SSE（导出进度 / 通知）：关缓冲 + 长读超时，事件流实时下发而非被缓冲/截断。
        proxy_set_header Connection '';
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 1h;
    }

    # 内容哈希构建产物 → 强缓存（文件名随内容变化）。
    location /assets/ {
        expires 1y;
        try_files $uri =404;
    }

    # SPA 回退：未命中的路由一律回 index.html；不缓存以便新部署立刻生效
    #（用 expires 而非 add_header，保留继承的安全响应头）。
    location / {
        expires -1;
        try_files $uri $uri/ /index.html;
    }
}
