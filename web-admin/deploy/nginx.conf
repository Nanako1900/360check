# C5 web-admin — nginx server config (production static serving).
# Listens on 8080 (nginx-unprivileged runs as non-root uid 101 → works with a
# readOnlyRootFilesystem k8s securityContext). The API is reached at /api/v1 via
# the ingress/gateway and is NOT served or proxied here.
#
# NOTE on headers: nginx does NOT inherit `add_header` into a location that has its
# own `add_header`. To keep the security headers on every response, they are set
# ONCE at server scope and caching is controlled with `expires` (which does not
# reset inherited add_header), never with a per-location `add_header Cache-Control`.
server {
    listen 8080;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # --- security headers (every response, incl. the index.html document) ---
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
    # CSP: no inline scripts (Vite emits external hashed modules). 'unsafe-inline'
    # is required only for styles (antd / CSS-in-JS inject style tags). The Tencent
    # Map GL JS SDK + tiles and COS/CDN media domains are allowlisted; tighten the
    # wildcard host lists to your exact buckets/CDN before go-live.
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' https://map.qq.com https://*.map.qq.com; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob: https:; font-src 'self' data:; connect-src 'self' https://*.map.qq.com https://*.gtimg.com https://*.myqcloud.com; worker-src 'self' blob:; frame-src 'self'; object-src 'none'; base-uri 'self'; form-action 'self'" always;

    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/css application/javascript application/json image/svg+xml application/wasm;

    # Content-hashed build assets → cache hard (filenames change on every change).
    location /assets/ {
        expires 1y;
        try_files $uri =404;
    }

    # SPA: serve index.html for any unmatched route; revalidate so new deploys are
    # picked up immediately (expires, not add_header, to keep security headers).
    location / {
        expires -1;
        try_files $uri $uri/ /index.html;
    }
}
